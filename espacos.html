<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0ede8;--border:#e2ddd6;--text:#1a1916;--text2:#6b6760;--text3:#9e9b96;--accent:#2d6a4f;--accent2:#40916c;--accent-light:#d8f3dc;--amber:#b5621a;--amber-light:#fef3e2;--red:#c0392b;--red-light:#fde8e8;--blue:#1a5276;--blue-light:#e8f4fd;--radius:12px;--radius-sm:8px;--font:'DM Sans',sans-serif}
[data-theme=dark]{--bg:#0f0e0c;--surface:#1a1916;--surface2:#242220;--border:#2e2c28;--text:#f0ede8;--text2:#9e9b96;--text3:#6b6760;--accent:#40916c;--accent2:#52b788;--accent-light:#1b3a2d;--amber:#e07b30;--amber-light:#2a1f0e;--red:#e05252;--red-light:#2a1212;--blue:#3b82c4;--blue-light:#0e2035}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.6;padding:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--font);transition:all 0.15s}
.btn:hover{background:var(--surface2);color:var(--text)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent2)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{background:var(--red-light);color:var(--red);border-color:var(--red)}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}

/* TABS */
.tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:20px;width:fit-content}
.tab{padding:9px 20px;font-size:13.5px;font-weight:500;cursor:pointer;color:var(--text2);background:transparent;border:none;font-family:var(--font);transition:all 0.15s}
.tab.active{background:var(--accent);color:#fff}
.page{display:none}.page.active{display:block}

/* ESPAÇOS GRID */
.espacos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.espaco-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color 0.15s}
.espaco-card:hover{border-color:var(--text3);box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.espaco-foto{height:160px;background:var(--surface2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.espaco-foto img{width:100%;height:100%;object-fit:cover}
.espaco-foto-placeholder{font-size:40px;color:var(--text3)}
.espaco-status{position:absolute;top:8px;right:8px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.st-ativo{background:var(--accent-light);color:var(--accent)}
.st-inativo{background:var(--red-light);color:var(--red)}
.espaco-body{padding:14px}
.espaco-nome{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.espaco-cap{font-size:12.5px;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.espaco-desc{font-size:13px;color:var(--text2);margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.espaco-valores{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.valor-tag{font-size:12px;font-weight:500;padding:3px 9px;border-radius:20px;background:var(--accent-light);color:var(--accent)}
.espaco-horarios{font-size:12px;color:var(--text3);margin-bottom:12px}
.espaco-footer{display:flex;gap:6px;padding-top:10px;border-top:1px solid var(--border)}

/* HORÁRIOS */
.hora-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:8px}
.hora-dia{text-align:center}
.hora-dia-label{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:4px;text-transform:uppercase}
.hora-slot{font-size:11px;padding:3px 4px;border-radius:4px;text-align:center;cursor:pointer;border:1px solid var(--border);color:var(--text2);transition:all 0.15s;user-select:none}
.hora-slot.sel{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}

/* FOTOS UPLOAD */
.foto-upload{border:2px dashed var(--border);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:background 0.15s;margin-bottom:10px}
.foto-upload:hover{background:var(--surface2)}
.foto-upload i{font-size:26px;color:var(--text3);display:block;margin-bottom:6px}
.fotos-preview{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.foto-thumb{width:80px;height:80px;border-radius:var(--radius-sm);overflow:hidden;position:relative;background:var(--surface2)}
.foto-thumb img{width:100%;height:100%;object-fit:cover}
.foto-rm{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:var(--red-light);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--red);font-size:10px}

/* ITENS & SERVIÇOS */
.item-serv-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.is-icon{width:40px;height:40px;border-radius:var(--radius-sm);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.is-name{font-size:14px;font-weight:500;color:var(--text);flex:1;min-width:100px}
.is-desc{font-size:12px;color:var(--text3);margin-top:2px}
.is-val{font-size:14px;font-weight:600;color:var(--accent);flex-shrink:0}
.is-tipo{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--surface2);color:var(--text2);font-weight:500}

/* FORM */
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.field label{font-size:12px;font-weight:500;color:var(--text2)}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13.5px;background:var(--surface);color:var(--text);font-family:var(--font);outline:none;transition:border-color 0.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:70px;line-height:1.5}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.prefix{display:flex;align-items:center;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.prefix:focus-within{border-color:var(--accent)}
.prefix span{padding:8px 10px;font-size:13px;color:var(--text3);background:var(--surface2);border-right:1px solid var(--border);white-space:nowrap}
.prefix input{border:none;outline:none;padding:8px 10px;font-size:13.5px;background:transparent;color:var(--text);font-family:var(--font);width:100%}

/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:50;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.mbg.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;width:100%;max-width:560px;margin-top:20px}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.mttl{font-size:15px;font-weight:600;color:var(--text)}
.xbtn{width:28px;height:28px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:14px}
.mfooter{display:flex;justify-content:flex-end;gap:8px;padding-top:12px;border-top:1px solid var(--border);margin-top:4px}
.theme-toggle{cursor:pointer;width:34px;height:34px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:16px}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty i{font-size:36px;display:block;margin-bottom:10px}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div style="font-size:20px;font-weight:600;color:var(--text)">Espaços & Serviços</div>
    <div style="font-size:13px;color:var(--text3);margin-top:2px">Gerencie seus locais e itens disponíveis</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <div class="theme-toggle" onclick="toggleTheme()" id="tbtn"><i class="ti ti-moon"></i></div>
    <button class="btn btn-primary" id="btn-novo" onclick="abrirModalEspaco()"><i class="ti ti-plus" style="font-size:14px"></i>Novo espaço</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="tab-espacos" onclick="switchTab('espacos',this)"><i class="ti ti-building" style="font-size:14px;margin-right:5px"></i>Espaços</button>
  <button class="tab" id="tab-servicos" onclick="switchTab('servicos',this)"><i class="ti ti-armchair" style="font-size:14px;margin-right:5px"></i>Itens & Serviços</button>
</div>

<!-- ESPAÇOS -->
<div class="page active" id="page-espacos">
  <div class="espacos-grid" id="espacos-grid"></div>
</div>

<!-- ITENS & SERVIÇOS -->
<div class="page" id="page-servicos">
  <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
    <button class="btn btn-primary" onclick="abrirModalServico()"><i class="ti ti-plus" style="font-size:14px"></i>Novo item/serviço</button>
  </div>
  <div id="servicos-list"></div>
</div>

<!-- MODAL ESPAÇO -->
<div class="mbg" id="mbg-espaco" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <div class="mhdr">
      <div class="mttl" id="espaco-modal-title">Novo espaço</div>
      <button class="xbtn" onclick="document.getElementById('mbg-espaco').classList.remove('show')"><i class="ti ti-x" style="font-size:13px"></i></button>
    </div>

    <div class="field"><label>Nome do espaço *</label><input type="text" id="e-nome" placeholder="Ex: Salão Principal, Sítio das Flores..."></div>
    <div class="g2">
      <div class="field"><label>Capacidade (pessoas)</label><input type="number" id="e-cap" placeholder="Ex: 150" min="1"></div>
      <div class="field"><label>Status</label>
        <select id="e-status"><option value="ativo">✅ Ativo</option><option value="inativo">🚫 Inativo</option></select>
      </div>
    </div>
    <div class="field"><label>Descrição</label><textarea id="e-desc" placeholder="Descreva o espaço, diferenciais, infraestrutura..."></textarea></div>

    <div class="g2">
      <div class="field"><label>Valor por período (diurno)</label><div class="prefix"><span>R$</span><input type="text" id="e-val-dia" placeholder="0,00" oninput="maskMoney(this)"></div></div>
      <div class="field"><label>Valor por período (noturno)</label><div class="prefix"><span>R$</span><input type="text" id="e-val-noi" placeholder="0,00" oninput="maskMoney(this)"></div></div>
    </div>
    <div class="field"><label>Valor diária completa</label><div class="prefix"><span>R$</span><input type="text" id="e-val-dia-comp" placeholder="0,00" oninput="maskMoney(this)"></div></div>

    <div style="font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px">Horários disponíveis por dia da semana</div>
    <div class="g2">
      <div class="field"><label>Abertura</label><input type="time" id="e-hora-ini" value="08:00"></div>
      <div class="field"><label>Fechamento</label><input type="time" id="e-hora-fim" value="23:00"></div>
    </div>
    <div style="font-size:11.5px;font-weight:500;color:var(--text2);margin-bottom:6px">Dias disponíveis</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px" id="dias-wrap">
      <div class="hora-slot sel" data-d="seg">Seg</div>
      <div class="hora-slot sel" data-d="ter">Ter</div>
      <div class="hora-slot sel" data-d="qua">Qua</div>
      <div class="hora-slot sel" data-d="qui">Qui</div>
      <div class="hora-slot sel" data-d="sex">Sex</div>
      <div class="hora-slot sel" data-d="sab">Sáb</div>
      <div class="hora-slot sel" data-d="dom">Dom</div>
    </div>

    <div style="font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px">Fotos do espaço</div>
    <div class="fotos-preview" id="fotos-preview"></div>
    <div class="foto-upload" onclick="document.getElementById('foto-input').click()">
      <i class="ti ti-photo-up"></i>
      <span style="font-size:13px;color:var(--text2)">Clique para adicionar fotos</span>
      <small style="font-size:11.5px;color:var(--text3);display:block;margin-top:3px">PNG ou JPG · múltiplas fotos</small>
      <input type="file" id="foto-input" accept="image/*" multiple style="display:none" onchange="addFotos(this)">
    </div>

    <div class="mfooter">
      <button class="btn" onclick="document.getElementById('mbg-espaco').classList.remove('show')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarEspaco()"><i class="ti ti-device-floppy" style="font-size:13px"></i>Salvar espaço</button>
    </div>
  </div>
</div>

<!-- MODAL SERVIÇO -->
<div class="mbg" id="mbg-servico" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <div class="mhdr">
      <div class="mttl" id="serv-modal-title">Novo item/serviço</div>
      <button class="xbtn" onclick="document.getElementById('mbg-servico').classList.remove('show')"><i class="ti ti-x" style="font-size:13px"></i></button>
    </div>
    <div class="g2">
      <div class="field"><label>Nome *</label><input type="text" id="s-nome" placeholder="Ex: Cadeira Tiffany, Mesa redonda, Som..."></div>
      <div class="field"><label>Ícone (emoji)</label><input type="text" id="s-icon" placeholder="Ex: 🪑 🎵 🎤" maxlength="4"></div>
    </div>
    <div class="g2">
      <div class="field"><label>Tipo de cobrança</label>
        <select id="s-tipo">
          <option value="fixo">💰 Valor fixo</option>
          <option value="unidade">📦 Por unidade</option>
          <option value="pessoa">👤 Por pessoa</option>
        </select>
      </div>
      <div class="field"><label>Valor</label><div class="prefix"><span>R$</span><input type="text" id="s-val" placeholder="0,00" oninput="maskMoney(this)"></div></div>
    </div>
    <div class="field"><label>Descrição</label><input type="text" id="s-desc" placeholder="Detalhes do item ou serviço..."></div>
    <div class="mfooter">
      <button class="btn" onclick="document.getElementById('mbg-servico').classList.remove('show')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarServico()"><i class="ti ti-device-floppy" style="font-size:13px"></i>Salvar</button>
    </div>
  </div>
</div>

<script>
let dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
let espacos=[
  {id:1,nome:'Salão Principal',cap:150,desc:'Salão climatizado com cozinha industrial completa, banheiros reformados e estacionamento para 50 carros.',valDia:2500,valNoi:3500,valComp:5000,horaIni:'08:00',horaFim:'23:00',dias:['seg','ter','qua','qui','sex','sab','dom'],fotos:[],status:'ativo'},
  {id:2,nome:'Sítio das Flores',cap:300,desc:'Espaço ao ar livre com piscina, churrasqueira, área kids e alojamento para 20 pessoas.',valDia:4000,valNoi:5000,valComp:8000,horaIni:'08:00',horaFim:'04:00',dias:['sex','sab','dom'],fotos:[],status:'ativo'},
  {id:3,nome:'Espaço Gourmet',cap:80,desc:'Ambiente sofisticado para eventos menores, com cozinha show e adega climatizada.',valDia:1800,valNoi:2500,valComp:3800,horaIni:'10:00',horaFim:'23:00',dias:['seg','ter','qua','qui','sex','sab'],fotos:[],status:'ativo'},
];
let servicos=[
  {id:1,icon:'🪑',nome:'Cadeira Tiffany',tipo:'unidade',val:8,desc:'Cadeira branca ou dourada'},
  {id:2,icon:'🍽️',nome:'Mesa redonda',tipo:'unidade',val:45,desc:'Mesa para 8 pessoas com tampo de vidro'},
  {id:3,icon:'🎵',nome:'Sistema de som',tipo:'fixo',val:800,desc:'Caixas de som, microfone e mesa de som'},
  {id:4,icon:'💡',nome:'Iluminação especial',tipo:'fixo',val:600,desc:'Iluminação decorativa para o evento'},
  {id:5,icon:'🎤',nome:'Microfone sem fio',tipo:'unidade',val:150,desc:'Por unidade, por evento'},
];
let nidE=4,nidS=6;
let editEspId=null,editServId=null;
let fotosPendentes=[];

function applyTheme(){document.documentElement.setAttribute('data-theme',dark?'dark':'light');document.getElementById('tbtn').innerHTML=dark?'<i class="ti ti-sun"></i>':'<i class="ti ti-moon"></i>';}
function toggleTheme(){dark=!dark;applyTheme();}
applyTheme();

function switchTab(id,btn){
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('page-'+id).classList.add('active');
  document.getElementById('btn-novo').onclick=id==='espacos'?abrirModalEspaco:abrirModalServico;
  document.getElementById('btn-novo').innerHTML='<i class="ti ti-plus" style="font-size:14px"></i>Novo '+(id==='espacos'?'espaço':'item/serviço');
}

// ESPAÇOS
function renderEspacos(){
  const grid=document.getElementById('espacos-grid');
  grid.innerHTML='';
  if(!espacos.length){grid.innerHTML='<div class="empty" style="grid-column:1/-1"><i class="ti ti-building-off"></i><p>Nenhum espaço cadastrado ainda</p></div>';return;}
  espacos.forEach(function(e){
    const div=document.createElement('div');div.className='espaco-card';
    div.innerHTML=
      '<div class="espaco-foto">'+(e.fotos&&e.fotos.length?'<img src="'+e.fotos[0]+'" alt="'+e.nome+'">':'<span class="espaco-foto-placeholder">🏛️</span>')+'<span class="espaco-status '+(e.status==='ativo'?'st-ativo':'st-inativo')+'">'+(e.status==='ativo'?'✅ Ativo':'🚫 Inativo')+'</span></div>'+
      '<div class="espaco-body">'+
        '<div class="espaco-nome">'+e.nome+'</div>'+
        '<div class="espaco-cap"><i class="ti ti-users" style="font-size:13px"></i>Até '+e.cap+' pessoas</div>'+
        '<div class="espaco-desc">'+e.desc+'</div>'+
        '<div class="espaco-valores">'+
          (e.valDia?'<span class="valor-tag">☀️ R$ '+fmt(e.valDia)+' diurno</span>':'')+
          (e.valNoi?'<span class="valor-tag">🌙 R$ '+fmt(e.valNoi)+' noturno</span>':'')+
          (e.valComp?'<span class="valor-tag">📅 R$ '+fmt(e.valComp)+' diária</span>':'')+
        '</div>'+
        '<div class="espaco-horarios"><i class="ti ti-clock" style="font-size:12px;margin-right:4px"></i>'+e.horaIni+' às '+e.horaFim+' · '+e.dias.join(', ')+'</div>'+
        '<div class="espaco-footer">'+
          '<button class="btn btn-sm" onclick="editarEspaco('+e.id+')"><i class="ti ti-edit" style="font-size:12px"></i>Editar</button>'+
          '<button class="btn btn-sm btn-danger" onclick="excluirEspaco('+e.id+')" style="margin-left:auto"><i class="ti ti-trash" style="font-size:12px"></i>Excluir</button>'+
        '</div>'+
      '</div>';
    grid.appendChild(div);
  });
}

function abrirModalEspaco(id){
  editEspId=id||null;fotosPendentes=[];
  document.getElementById('espaco-modal-title').textContent=id?'Editar espaço':'Novo espaço';
  document.getElementById('fotos-preview').innerHTML='';
  document.querySelectorAll('#dias-wrap .hora-slot').forEach(function(d){d.classList.add('sel');});
  if(id){
    const e=espacos.find(function(x){return x.id===id;});if(!e)return;
    document.getElementById('e-nome').value=e.nome;
    document.getElementById('e-cap').value=e.cap;
    document.getElementById('e-status').value=e.status;
    document.getElementById('e-desc').value=e.desc;
    document.getElementById('e-val-dia').value=fmt(e.valDia);
    document.getElementById('e-val-noi').value=fmt(e.valNoi);
    document.getElementById('e-val-dia-comp').value=fmt(e.valComp);
    document.getElementById('e-hora-ini').value=e.horaIni;
    document.getElementById('e-hora-fim').value=e.horaFim;
    document.querySelectorAll('#dias-wrap .hora-slot').forEach(function(d){d.classList.toggle('sel',e.dias.includes(d.dataset.d));});
    fotosPendentes=e.fotos?e.fotos.slice():[];
    renderFotosPreview();
  } else {
    ['e-nome','e-desc','e-val-dia','e-val-noi','e-val-dia-comp'].forEach(function(id){document.getElementById(id).value='';});
    document.getElementById('e-cap').value='';
    document.getElementById('e-status').value='ativo';
    document.getElementById('e-hora-ini').value='08:00';
    document.getElementById('e-hora-fim').value='23:00';
  }
  document.getElementById('mbg-espaco').classList.add('show');
}

function editarEspaco(id){abrirModalEspaco(id);}

function excluirEspaco(id){
  if(!confirm('Excluir este espaço?'))return;
  espacos=espacos.filter(function(x){return x.id!==id;});
  renderEspacos();
}

function salvarEspaco(){
  const nome=document.getElementById('e-nome').value.trim();
  if(!nome){alert('Informe o nome do espaço.');return;}
  const dias=[...document.querySelectorAll('#dias-wrap .hora-slot.sel')].map(function(d){return d.dataset.d;});
  const espaco={
    id:editEspId||nidE++,
    nome,cap:parseInt(document.getElementById('e-cap').value)||0,
    status:document.getElementById('e-status').value,
    desc:document.getElementById('e-desc').value,
    valDia:parseMoney(document.getElementById('e-val-dia').value),
    valNoi:parseMoney(document.getElementById('e-val-noi').value),
    valComp:parseMoney(document.getElementById('e-val-dia-comp').value),
    horaIni:document.getElementById('e-hora-ini').value,
    horaFim:document.getElementById('e-hora-fim').value,
    dias,fotos:fotosPendentes.slice(),
  };
  if(editEspId){const idx=espacos.findIndex(function(x){return x.id===editEspId;});if(idx>=0)espacos[idx]=espaco;}
  else espacos.push(espaco);
  document.getElementById('mbg-espaco').classList.remove('show');
  renderEspacos();
}

function addFotos(inp){
  Array.from(inp.files).forEach(function(f){
    const r=new FileReader();
    r.onload=function(e){fotosPendentes.push(e.target.result);renderFotosPreview();};
    r.readAsDataURL(f);
  });
  inp.value='';
}

function renderFotosPreview(){
  const el=document.getElementById('fotos-preview');
  el.innerHTML='';
  fotosPendentes.forEach(function(src,i){
    const div=document.createElement('div');div.className='foto-thumb';
    div.innerHTML='<img src="'+src+'" alt="Foto '+(i+1)+'"><button class="foto-rm" onclick="removeFoto('+i+')" aria-label="Remover"><i class="ti ti-x" style="font-size:9px"></i></button>';
    el.appendChild(div);
  });
}
function removeFoto(i){fotosPendentes.splice(i,1);renderFotosPreview();}

// Clique nos dias
document.querySelectorAll('#dias-wrap .hora-slot').forEach(function(d){
  d.onclick=function(){d.classList.toggle('sel');};
});

// SERVIÇOS
function renderServicos(){
  const el=document.getElementById('servicos-list');
  el.innerHTML='';
  if(!servicos.length){el.innerHTML='<div class="empty"><i class="ti ti-armchair-off"></i><p>Nenhum item ou serviço cadastrado ainda</p></div>';return;}
  const tipoLabel={fixo:'💰 Valor fixo',unidade:'📦 Por unidade',pessoa:'👤 Por pessoa'};
  servicos.forEach(function(s){
    const div=document.createElement('div');div.className='item-serv-card';
    div.innerHTML=
      '<div class="is-icon">'+(s.icon||'📦')+'</div>'+
      '<div style="flex:1;min-width:100px">'+
        '<div class="is-name">'+s.nome+'</div>'+
        (s.desc?'<div class="is-desc">'+s.desc+'</div>':'')+
        '<span class="is-tipo" style="margin-top:4px;display:inline-block">'+(tipoLabel[s.tipo]||s.tipo)+'</span>'+
      '</div>'+
      '<div style="text-align:right;flex-shrink:0">'+
        '<div class="is-val">R$ '+fmt(s.val)+'</div>'+
        '<div style="display:flex;gap:5px;margin-top:6px;justify-content:flex-end">'+
          '<button class="btn btn-sm" onclick="editarServico('+s.id+')"><i class="ti ti-edit" style="font-size:11px"></i></button>'+
          '<button class="btn btn-sm btn-danger" onclick="excluirServico('+s.id+')"><i class="ti ti-trash" style="font-size:11px"></i></button>'+
        '</div>'+
      '</div>';
    el.appendChild(div);
  });
}

function abrirModalServico(id){
  editServId=id||null;
  document.getElementById('serv-modal-title').textContent=id?'Editar item/serviço':'Novo item/serviço';
  if(id){
    const s=servicos.find(function(x){return x.id===id;});if(!s)return;
    document.getElementById('s-nome').value=s.nome;
    document.getElementById('s-icon').value=s.icon||'';
    document.getElementById('s-tipo').value=s.tipo;
    document.getElementById('s-val').value=fmt(s.val);
    document.getElementById('s-desc').value=s.desc||'';
  } else {
    ['s-nome','s-icon','s-val','s-desc'].forEach(function(id){document.getElementById(id).value='';});
    document.getElementById('s-tipo').value='fixo';
  }
  document.getElementById('mbg-servico').classList.add('show');
}

function editarServico(id){abrirModalServico(id);}

function excluirServico(id){
  if(!confirm('Excluir este item?'))return;
  servicos=servicos.filter(function(x){return x.id!==id;});
  renderServicos();
}

function salvarServico(){
  const nome=document.getElementById('s-nome').value.trim();
  if(!nome){alert('Informe o nome do item.');return;}
  const serv={
    id:editServId||nidS++,
    nome,icon:document.getElementById('s-icon').value||'📦',
    tipo:document.getElementById('s-tipo').value,
    val:parseMoney(document.getElementById('s-val').value),
    desc:document.getElementById('s-desc').value,
  };
  if(editServId){const idx=servicos.findIndex(function(x){return x.id===editServId;});if(idx>=0)servicos[idx]=serv;}
  else servicos.push(serv);
  document.getElementById('mbg-servico').classList.remove('show');
  renderServicos();
}

function fmt(v){return Number(v||0).toFixed(2).replace('.',',');}
function fmtBRL(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function maskMoney(el){let v=el.value.replace(/\D/g,'');v=(parseInt(v||0)/100).toFixed(2);el.value=v.replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
function parseMoney(s){return parseFloat((s||'0').replace(/\./g,'').replace(',','.'))||0;}

renderEspacos();
renderServicos();
</script>
