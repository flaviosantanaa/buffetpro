<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0ede8;--border:#e2ddd6;--text:#1a1916;--text2:#6b6760;--text3:#9e9b96;--accent:#2d6a4f;--accent2:#40916c;--accent-light:#d8f3dc;--amber:#b5621a;--amber-light:#fef3e2;--red:#c0392b;--red-light:#fde8e8;--blue:#1a5276;--blue-light:#e8f4fd;--radius:12px;--radius-sm:8px;--font:'DM Sans',sans-serif}
[data-theme=dark]{--bg:#0f0e0c;--surface:#1a1916;--surface2:#242220;--border:#2e2c28;--text:#f0ede8;--text2:#9e9b96;--text3:#6b6760;--accent:#40916c;--accent2:#52b788;--accent-light:#1b3a2d;--amber:#e07b30;--amber-light:#2a1f0e;--red:#e05252;--red-light:#2a1212;--blue:#3b82c4;--blue-light:#0e2035}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.6;padding:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--font);transition:all 0.15s}
.btn:hover{background:var(--surface2);color:var(--text)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent2)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{background:var(--red-light);color:var(--red);border-color:var(--red)}
.btn-amber{background:var(--amber-light);color:var(--amber);border-color:var(--amber)}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.b-rasc{background:var(--surface2);color:var(--text3)}
.b-env{background:var(--blue-light);color:var(--blue)}
.b-apr{background:var(--accent-light);color:var(--accent)}
.b-rep{background:var(--red-light);color:var(--red)}
.b-ctr{background:var(--amber-light);color:var(--amber)}
/* LISTA */
.orc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.orc-card:hover{border-color:var(--text3);box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.orc-num{font-size:12px;font-weight:700;color:var(--text3);min-width:60px}
.orc-name{font-size:14px;font-weight:600;color:var(--text);flex:1;min-width:140px}
.orc-event{font-size:12.5px;color:var(--text2)}
.orc-val{font-size:15px;font-weight:600;color:var(--accent);min-width:100px;text-align:right}
.orc-date{font-size:12px;color:var(--text3);min-width:80px;text-align:right}
/* FORMULÁRIO */
.form-section{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.form-section:last-child{border-bottom:none}
.form-section-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.form-section-title i{font-size:16px;color:var(--text3)}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.field label{font-size:12px;font-weight:500;color:var(--text2)}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13.5px;background:var(--surface);color:var(--text);font-family:var(--font);outline:none;transition:border-color 0.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:70px;line-height:1.5}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.prefix{display:flex;align-items:center;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;transition:border-color 0.15s}
.prefix:focus-within{border-color:var(--accent)}
.prefix span{padding:8px 10px;font-size:13px;color:var(--text3);background:var(--surface2);border-right:1px solid var(--border);white-space:nowrap}
.prefix input{border:none;outline:none;padding:8px 10px;font-size:13.5px;background:transparent;color:var(--text);font-family:var(--font);width:100%}
/* ITENS DO ORÇAMENTO */
.item-row{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;align-items:center;background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px}
.item-name{font-size:13px;font-weight:500;color:var(--text)}
.item-qty{font-size:13px;color:var(--text2);text-align:center}
.item-val{font-size:13px;font-weight:500;color:var(--accent);text-align:right}
.item-rm{width:26px;height:26px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px;transition:all 0.15s}
.item-rm:hover{background:var(--red-light);color:var(--red);border-color:var(--red)}
.add-item-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;padding-top:10px;border-top:1px solid var(--border)}
/* TOTAL */
.total-box{background:var(--surface2);border-radius:var(--radius-sm);padding:14px 16px}
.total-row{display:flex;justify-content:space-between;font-size:13.5px;padding:5px 0;border-bottom:1px solid var(--border)}
.total-row:last-child{border-bottom:none;font-weight:600;font-size:16px;padding-top:8px;color:var(--text)}
.total-label{color:var(--text2)}
/* STATUS STEPS */
.status-steps{display:flex;gap:0;margin-bottom:20px;overflow-x:auto}
.step{flex:1;min-width:80px;padding:8px 12px;text-align:center;font-size:12px;font-weight:500;border:1px solid var(--border);border-right:none;cursor:pointer;transition:all 0.15s;color:var(--text2);background:transparent;font-family:var(--font)}
.step:first-child{border-radius:var(--radius-sm) 0 0 var(--radius-sm)}
.step:last-child{border-right:1px solid var(--border);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.step.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.step.done{background:var(--accent-light);color:var(--accent);border-color:var(--accent-border)}
/* PARCELAS */
.parc-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:6px;font-size:13px}
.parc-num{color:var(--text3);min-width:24px;font-weight:600}
.parc-date{flex:1;color:var(--text2)}
.parc-val{font-weight:500;color:var(--accent);min-width:90px;text-align:right}
/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:50;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.mbg.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;width:100%;max-width:560px;margin-top:20px}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.mttl{font-size:15px;font-weight:600;color:var(--text)}
.xbtn{width:28px;height:28px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:14px}
.mfooter{display:flex;justify-content:flex-end;gap:8px;padding-top:12px;border-top:1px solid var(--border);margin-top:4px}
.theme-toggle{cursor:pointer;width:34px;height:34px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:16px}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty i{font-size:36px;display:block;margin-bottom:10px}
.view{display:none}.view.active{display:block}
.success-bar{display:none;background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-border);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:16px;align-items:center;gap:8px}
.success-bar.show{display:flex}
</style>
</head>
<body>

<!-- LISTA DE ORÇAMENTOS -->
<div class="view active" id="view-lista">
  <div class="topbar">
    <div>
      <div style="font-size:20px;font-weight:600;color:var(--text)">Orçamentos</div>
      <div style="font-size:13px;color:var(--text3);margin-top:2px" id="orc-count"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="theme-toggle" onclick="toggleTheme()" id="tbtn"><i class="ti ti-moon"></i></div>
      <button class="btn btn-primary" onclick="novoOrcamento()"><i class="ti ti-plus" style="font-size:14px"></i>Novo orçamento</button>
    </div>
  </div>

  <!-- FILTROS STATUS -->
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">
    <div class="btn btn-sm" id="f-todos" onclick="setFiltro('todos',this)" style="background:var(--accent);color:#fff;border-color:var(--accent)">Todos</div>
    <div class="btn btn-sm" id="f-rasc" onclick="setFiltro('rascunho',this)">📝 Rascunho</div>
    <div class="btn btn-sm" id="f-env" onclick="setFiltro('enviado',this)">📤 Enviado</div>
    <div class="btn btn-sm" id="f-apr" onclick="setFiltro('aprovado',this)">✅ Aprovado</div>
    <div class="btn btn-sm" id="f-rep" onclick="setFiltro('reprovado',this)">❌ Reprovado</div>
    <div class="btn btn-sm" id="f-ctr" onclick="setFiltro('contrato',this)">📄 Contrato</div>
  </div>

  <div id="orc-list"></div>
</div>

<!-- FORMULÁRIO NOVO / EDITAR -->
<div class="view" id="view-form">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="btn btn-sm" onclick="voltarLista()"><i class="ti ti-arrow-left" style="font-size:13px"></i>Voltar</button>
      <div>
        <div style="font-size:18px;font-weight:600;color:var(--text)" id="form-title">Novo orçamento</div>
        <div style="font-size:12px;color:var(--text3);margin-top:1px" id="form-num"></div>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="salvarOrcamento('rascunho')"><i class="ti ti-device-floppy" style="font-size:14px"></i>Salvar rascunho</button>
      <button class="btn btn-primary" onclick="salvarOrcamento('enviado')"><i class="ti ti-send" style="font-size:14px"></i>Salvar e enviar</button>
    </div>
  </div>

  <div class="success-bar" id="success-bar"><i class="ti ti-circle-check" style="font-size:16px"></i><span id="success-msg"></span></div>

  <!-- STATUS -->
  <div id="status-steps-wrap" style="display:none">
    <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Status do orçamento</div>
    <div class="status-steps" id="status-steps"></div>
    <div id="converter-btn-wrap" style="display:none;margin-bottom:16px">
      <button class="btn btn-amber" onclick="converterContrato()"><i class="ti ti-file-check" style="font-size:14px"></i>Converter em contrato</button>
    </div>
  </div>

  <!-- CLIENTE -->
  <div class="card">
    <div class="form-section">
      <div class="form-section-title"><i class="ti ti-user"></i>Dados do cliente</div>
      <div class="g2">
        <div class="field"><label>Nome do cliente *</label><input type="text" id="f-cliente" placeholder="Nome completo ou empresa"></div>
        <div class="field"><label>Telefone / WhatsApp</label><input type="text" id="f-telefone" placeholder="(11) 99999-0000"></div>
      </div>
      <div class="field"><label>E-mail</label><input type="email" id="f-email" placeholder="email@exemplo.com"></div>
    </div>

    <!-- EVENTO -->
    <div class="form-section">
      <div class="form-section-title"><i class="ti ti-calendar-event"></i>Dados do evento</div>
      <div class="g2">
        <div class="field"><label>Tipo de evento</label>
          <select id="f-tipo">
            <option value="">Selecione</option>
            <option>Aniversário</option><option>Casamento</option><option>Formatura</option>
            <option>Corporativo</option><option>Churrasco</option><option>Café da manhã</option><option>Outro</option>
          </select>
        </div>
        <div class="field"><label>Espaço</label>
          <select id="f-espaco">
            <option value="">Selecione</option>
            <option>Salão Principal</option><option>Sítio das Flores</option><option>Espaço Gourmet</option><option>Área Externa</option>
          </select>
        </div>
      </div>
      <div class="g3">
        <div class="field"><label>Data do evento</label><input type="date" id="f-data"></div>
        <div class="field"><label>Horário de início</label><input type="time" id="f-horario-ini"></div>
        <div class="field"><label>Horário de término</label><input type="time" id="f-horario-fim"></div>
      </div>
      <div class="g2">
        <div class="field"><label>Nº de adultos</label><input type="number" id="f-adultos" placeholder="Ex: 80" min="0" oninput="recalcTotal()"></div>
        <div class="field"><label>Nº de crianças</label><input type="number" id="f-criancas" placeholder="Ex: 20" min="0" oninput="recalcTotal()"></div>
      </div>
    </div>

    <!-- ITENS / SERVIÇOS -->
    <div class="form-section">
      <div class="form-section-title"><i class="ti ti-list"></i>Itens e serviços</div>
      <div id="itens-list"></div>
      <div class="add-item-row">
        <div class="field" style="flex:2;min-width:140px;margin-bottom:0"><label>Descrição</label><input type="text" id="new-item-desc" placeholder="Ex: Buffet completo, DJ, Decoração..."></div>
        <div class="field" style="flex:1;min-width:80px;margin-bottom:0"><label>Qtd</label><input type="number" id="new-item-qty" placeholder="1" min="1" value="1"></div>
        <div class="field" style="flex:1;min-width:100px;margin-bottom:0"><label>Valor unit.</label><div class="prefix"><span>R$</span><input type="text" id="new-item-val" placeholder="0,00" oninput="maskMoney(this)"></div></div>
        <button class="btn btn-sm" onclick="addItem()" style="flex-shrink:0;height:fit-content"><i class="ti ti-plus" style="font-size:13px"></i>Adicionar</button>
      </div>
    </div>

    <!-- PAGAMENTO -->
    <div class="form-section">
      <div class="form-section-title"><i class="ti ti-coins"></i>Pagamento</div>
      <div class="g2">
        <div class="field"><label>Forma de pagamento</label>
          <select id="f-forma" onchange="gerarParcelas()">
            <option>PIX</option><option>Débito</option><option>Crédito</option><option>Boleto</option><option>Dinheiro</option>
          </select>
        </div>
        <div class="field"><label>Nº de parcelas</label>
          <select id="f-parcelas" onchange="gerarParcelas()">
            <option value="1">À vista</option><option value="2">2x</option><option value="3">3x</option>
            <option value="4">4x</option><option value="5">5x</option><option value="6">6x</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Data do primeiro vencimento</label><input type="date" id="f-venc" onchange="gerarParcelas()"></div>
      <div id="parcelas-list"></div>
    </div>

    <!-- TOTAL -->
    <div class="form-section">
      <div class="form-section-title"><i class="ti ti-calculator"></i>Resumo financeiro</div>
      <div class="total-box">
        <div class="total-row"><span class="total-label">Subtotal itens</span><span id="t-subtotal">R$ 0,00</span></div>
        <div class="total-row"><span class="total-label">Total do orçamento</span><span id="t-total" style="color:var(--accent)">R$ 0,00</span></div>
      </div>
    </div>

    <!-- OBSERVAÇÕES -->
    <div>
      <div class="form-section-title"><i class="ti ti-note"></i>Observações</div>
      <div class="field" style="margin-bottom:0"><textarea id="f-obs" placeholder="Informações adicionais, condições especiais, detalhes importantes..."></textarea></div>
    </div>
  </div>

  <div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">
    <button class="btn" onclick="voltarLista()">Cancelar</button>
    <button class="btn" onclick="salvarOrcamento('rascunho')"><i class="ti ti-device-floppy"></i>Salvar rascunho</button>
    <button class="btn btn-primary" onclick="salvarOrcamento('enviado')"><i class="ti ti-send"></i>Salvar e enviar</button>
  </div>
</div>

<script>
let dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
let orcamentos=[
  {id:1,num:'ORC-001',cliente:'Ana Paula Silva',telefone:'(11) 99111-2222',email:'ana@email.com',tipo:'Aniversário',espaco:'Salão Principal',data:'2026-06-14',horIni:'19:00',horFim:'23:00',adultos:80,criancas:10,itens:[{desc:'Buffet completo',qty:1,val:8500},{desc:'DJ profissional',qty:1,val:1500},{desc:'Decoração temática',qty:1,val:2400}],forma:'PIX',parcelas:3,venc:'2026-05-01',obs:'Cliente quer cardápio personalizado.',status:'aprovado'},
  {id:2,num:'ORC-002',cliente:'Carlos Mendes',telefone:'(11) 99222-3333',email:'carlos@email.com',tipo:'Formatura',espaco:'Sítio das Flores',data:'2026-07-10',horIni:'20:00',horFim:'04:00',adultos:120,criancas:0,itens:[{desc:'Buffet formatura',qty:1,val:12000},{desc:'Open bar',qty:1,val:4800}],forma:'PIX',parcelas:2,venc:'2026-06-01',obs:'',status:'enviado'},
  {id:3,num:'ORC-003',cliente:'Família Costa',telefone:'(11) 99333-4444',email:'costa@email.com',tipo:'Casamento',espaco:'Sítio das Flores',data:'2026-12-20',horIni:'17:00',horFim:'04:00',adultos:200,criancas:20,itens:[{desc:'Buffet casamento',qty:1,val:25000},{desc:'Banda ao vivo',qty:1,val:8000},{desc:'Decoração floral',qty:1,val:6000}],forma:'Crédito',parcelas:6,venc:'2026-06-15',obs:'Cerimônia ao ar livre.',status:'rascunho'},
];
let nid=4;
let itens=[];
let filtroAtual='todos';
let editandoId=null;

function applyTheme(){document.documentElement.setAttribute('data-theme',dark?'dark':'light');document.getElementById('tbtn').innerHTML=dark?'<i class="ti ti-sun"></i>':'<i class="ti ti-moon"></i>';}
function toggleTheme(){dark=!dark;applyTheme();}
applyTheme();

const statusInfo={
  rascunho:{label:'📝 Rascunho',cls:'b-rasc'},
  enviado:{label:'📤 Enviado',cls:'b-env'},
  aprovado:{label:'✅ Aprovado',cls:'b-apr'},
  reprovado:{label:'❌ Reprovado',cls:'b-rep'},
  contrato:{label:'📄 Contrato',cls:'b-ctr'},
};
const statusOrder=['rascunho','enviado','aprovado','contrato'];

function setFiltro(f,btn){
  filtroAtual=f;
  document.querySelectorAll('[id^="f-"]').forEach(function(b){b.style.background='';b.style.color='';b.style.borderColor='';});
  btn.style.background='var(--accent)';btn.style.color='#fff';btn.style.borderColor='var(--accent)';
  renderLista();
}

function renderLista(){
  const list=document.getElementById('orc-list');
  const filtered=filtroAtual==='todos'?orcamentos:orcamentos.filter(function(o){return o.status===filtroAtual;});
  document.getElementById('orc-count').textContent=filtered.length+' orçamento'+(filtered.length===1?'':'s');
  if(!filtered.length){list.innerHTML='<div class="empty"><i class="ti ti-file-off"></i><p>Nenhum orçamento encontrado</p><button class="btn btn-primary" style="margin-top:12px" onclick="novoOrcamento()"><i class="ti ti-plus"></i>Novo orçamento</button></div>';return;}
  list.innerHTML='';
  filtered.forEach(function(o){
    const total=o.itens.reduce(function(s,i){return s+i.qty*i.val;},0);
    const si=statusInfo[o.status]||statusInfo.rascunho;
    const div=document.createElement('div');
    div.className='orc-card';
    div.innerHTML=
      '<div class="orc-num">'+o.num+'</div>'+
      '<div style="flex:1;min-width:140px"><div class="orc-name">'+o.cliente+'</div><div class="orc-event">'+o.tipo+(o.espaco?' · '+o.espaco:'')+(o.data?' · '+fmtD(o.data):'')+'</div></div>'+
      '<span class="badge '+si.cls+'">'+si.label+'</span>'+
      '<div class="orc-val">'+fmtBRL(total)+'</div>';
    div.onclick=function(){abrirOrcamento(o.id);};
    list.appendChild(div);
  });
}

function novoOrcamento(){
  editandoId=null;
  itens=[];
  document.getElementById('form-title').textContent='Novo orçamento';
  document.getElementById('form-num').textContent='';
  document.getElementById('status-steps-wrap').style.display='none';
  document.getElementById('converter-btn-wrap').style.display='none';
  document.getElementById('success-bar').classList.remove('show');
  ['f-cliente','f-telefone','f-email','f-data','f-horario-ini','f-horario-fim','f-obs'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('f-tipo').value='';
  document.getElementById('f-espaco').value='';
  document.getElementById('f-adultos').value='';
  document.getElementById('f-criancas').value='';
  document.getElementById('f-parcelas').value='1';
  document.getElementById('f-forma').value='PIX';
  document.getElementById('f-venc').value='';
  renderItens();
  document.getElementById('parcelas-list').innerHTML='';
  recalcTotal();
  showView('form');
}

function abrirOrcamento(id){
  const o=orcamentos.find(function(x){return x.id===id;});
  if(!o)return;
  editandoId=id;
  itens=o.itens.map(function(i){return Object.assign({},i);});
  document.getElementById('form-title').textContent='Orçamento — '+o.cliente;
  document.getElementById('form-num').textContent=o.num+' · '+o.tipo;
  document.getElementById('f-cliente').value=o.cliente||'';
  document.getElementById('f-telefone').value=o.telefone||'';
  document.getElementById('f-email').value=o.email||'';
  document.getElementById('f-tipo').value=o.tipo||'';
  document.getElementById('f-espaco').value=o.espaco||'';
  document.getElementById('f-data').value=o.data||'';
  document.getElementById('f-horario-ini').value=o.horIni||'';
  document.getElementById('f-horario-fim').value=o.horFim||'';
  document.getElementById('f-adultos').value=o.adultos||'';
  document.getElementById('f-criancas').value=o.criancas||'';
  document.getElementById('f-forma').value=o.forma||'PIX';
  document.getElementById('f-parcelas').value=o.parcelas||'1';
  document.getElementById('f-venc').value=o.venc||'';
  document.getElementById('f-obs').value=o.obs||'';
  document.getElementById('status-steps-wrap').style.display='block';
  renderStatusSteps(o.status);
  renderItens();
  gerarParcelas();
  recalcTotal();
  document.getElementById('success-bar').classList.remove('show');
  showView('form');
}

function renderStatusSteps(current){
  const wrap=document.getElementById('status-steps');
  wrap.innerHTML='';
  const curIdx=statusOrder.indexOf(current);
  statusOrder.forEach(function(s,i){
    const btn=document.createElement('button');
    btn.className='step'+(i<curIdx?' done':i===curIdx?' active':'');
    btn.textContent=statusInfo[s].label;
    if(i>curIdx&&i!==statusOrder.length-1){
      btn.onclick=function(){mudarStatus(s);};
    }
    wrap.appendChild(btn);
  });
  // Mostrar botão converter se aprovado
  document.getElementById('converter-btn-wrap').style.display=current==='aprovado'?'block':'none';
}

function mudarStatus(novoStatus){
  if(!editandoId)return;
  const o=orcamentos.find(function(x){return x.id===editandoId;});
  if(!o)return;
  o.status=novoStatus;
  renderStatusSteps(novoStatus);
  mostrarSucesso('Status atualizado para: '+statusInfo[novoStatus].label);
}

function converterContrato(){
  if(!editandoId)return;
  const o=orcamentos.find(function(x){return x.id===editandoId;});
  if(!o)return;
  if(!confirm('Converter este orçamento em contrato? O número mudará de ORC para CTR.'))return;
  o.status='contrato';
  o.num=o.num.replace('ORC','CTR');
  document.getElementById('form-num').textContent=o.num+' · '+o.tipo;
  renderStatusSteps('contrato');
  mostrarSucesso('🎉 Orçamento convertido em contrato com sucesso! Número: '+o.num);
}

function addItem(){
  const desc=document.getElementById('new-item-desc').value.trim();
  const qty=parseInt(document.getElementById('new-item-qty').value)||1;
  const val=parseMoney(document.getElementById('new-item-val').value);
  if(!desc)return;
  itens.push({desc,qty,val});
  document.getElementById('new-item-desc').value='';
  document.getElementById('new-item-val').value='';
  document.getElementById('new-item-qty').value='1';
  renderItens();
  recalcTotal();
  gerarParcelas();
}

function renderItens(){
  const el=document.getElementById('itens-list');
  el.innerHTML='';
  if(!itens.length){el.innerHTML='<div style="font-size:13px;color:var(--text3);text-align:center;padding:10px">Nenhum item adicionado ainda</div>';return;}
  itens.forEach(function(item,i){
    const div=document.createElement('div');div.className='item-row';
    div.innerHTML=
      '<div class="item-name">'+item.desc+'</div>'+
      '<div class="item-qty">'+item.qty+'x</div>'+
      '<div class="item-val">'+fmtBRL(item.qty*item.val)+'</div>'+
      '<button class="item-rm" onclick="removeItem('+i+')" aria-label="Remover"><i class="ti ti-trash" style="font-size:11px"></i></button>';
    el.appendChild(div);
  });
}

function removeItem(i){itens.splice(i,1);renderItens();recalcTotal();gerarParcelas();}

function recalcTotal(){
  const sub=itens.reduce(function(s,i){return s+i.qty*i.val;},0);
  document.getElementById('t-subtotal').textContent=fmtBRL(sub);
  document.getElementById('t-total').textContent=fmtBRL(sub);
}

function gerarParcelas(){
  const n=parseInt(document.getElementById('f-parcelas').value)||1;
  const vencStr=document.getElementById('f-venc').value;
  const total=itens.reduce(function(s,i){return s+i.qty*i.val;},0);
  const el=document.getElementById('parcelas-list');
  if(!total||!vencStr){el.innerHTML='';return;}
  const valParc=total/n;
  let html='';
  for(var i=0;i<n;i++){
    const d=new Date(vencStr+'T12:00:00');
    d.setMonth(d.getMonth()+i);
    const label=n===1?'Pagamento único':'Parcela '+(i+1)+'/'+n;
    html+='<div class="parc-row"><span class="parc-num">'+(i+1)+'</span><span class="parc-date">'+label+' · vence '+d.toLocaleDateString('pt-BR')+'</span><span class="parc-val">'+fmtBRL(valParc)+'</span></div>';
  }
  el.innerHTML=html;
}

function salvarOrcamento(status){
  const cliente=document.getElementById('f-cliente').value.trim();
  if(!cliente){alert('Informe o nome do cliente.');return;}
  if(!itens.length){alert('Adicione pelo menos um item ao orçamento.');return;}
  if(editandoId){
    const o=orcamentos.find(function(x){return x.id===editandoId;});
    if(o){
      o.cliente=cliente;o.telefone=document.getElementById('f-telefone').value;
      o.email=document.getElementById('f-email').value;o.tipo=document.getElementById('f-tipo').value;
      o.espaco=document.getElementById('f-espaco').value;o.data=document.getElementById('f-data').value;
      o.horIni=document.getElementById('f-horario-ini').value;o.horFim=document.getElementById('f-horario-fim').value;
      o.adultos=parseInt(document.getElementById('f-adultos').value)||0;
      o.criancas=parseInt(document.getElementById('f-criancas').value)||0;
      o.itens=itens.slice();o.forma=document.getElementById('f-forma').value;
      o.parcelas=document.getElementById('f-parcelas').value;
      o.venc=document.getElementById('f-venc').value;o.obs=document.getElementById('f-obs').value;
      if(o.status==='rascunho')o.status=status;
    }
  } else {
    const num='ORC-00'+nid;
    orcamentos.push({
      id:nid++,num,cliente,
      telefone:document.getElementById('f-telefone').value,
      email:document.getElementById('f-email').value,
      tipo:document.getElementById('f-tipo').value,
      espaco:document.getElementById('f-espaco').value,
      data:document.getElementById('f-data').value,
      horIni:document.getElementById('f-horario-ini').value,
      horFim:document.getElementById('f-horario-fim').value,
      adultos:parseInt(document.getElementById('f-adultos').value)||0,
      criancas:parseInt(document.getElementById('f-criancas').value)||0,
      itens:itens.slice(),
      forma:document.getElementById('f-forma').value,
      parcelas:document.getElementById('f-parcelas').value,
      venc:document.getElementById('f-venc').value,
      obs:document.getElementById('f-obs').value,
      status:status,
    });
  }
  mostrarSucesso(status==='enviado'?'Orçamento salvo e marcado como enviado!':'Rascunho salvo com sucesso!');
  setTimeout(function(){voltarLista();},1500);
}

function voltarLista(){renderLista();showView('lista');}
function showView(v){document.querySelectorAll('.view').forEach(function(el){el.classList.remove('active');});document.getElementById('view-'+v).classList.add('active');}
function mostrarSucesso(msg){const el=document.getElementById('success-bar');document.getElementById('success-msg').textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},4000);}
function fmtD(d){if(!d)return'';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function fmtBRL(v){return Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function maskMoney(el){let v=el.value.replace(/\D/g,'');v=(parseInt(v||0)/100).toFixed(2);el.value=v.replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
function parseMoney(s){return parseFloat((s||'0').replace(/\./g,'').replace(',','.'))||0;}

renderLista();
</script>
</body>
</html>
