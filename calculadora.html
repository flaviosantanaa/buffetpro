<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0ede8;--border:#e2ddd6;--text:#1a1916;--text2:#6b6760;--text3:#9e9b96;--accent:#2d6a4f;--accent2:#40916c;--accent-light:#d8f3dc;--amber:#b5621a;--amber-light:#fef3e2;--red:#c0392b;--red-light:#fde8e8;--radius:12px;--radius-sm:8px;--font:'DM Sans',sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.title{font-size:20px;font-weight:600;color:var(--text);margin-bottom:4px}
.sub{font-size:13px;color:var(--text3);margin-bottom:20px}
.event-types{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:20px}
.et{padding:10px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;transition:all 0.15s;text-align:center;background:transparent;font-family:var(--font);width:100%}
.et:hover{background:var(--surface2)}
.et.sel{border-color:var(--accent);background:var(--accent-light)}
.et-icon{font-size:22px;display:block;margin-bottom:4px}
.et-label{font-size:12px;font-weight:500;color:var(--text2)}
.et.sel .et-label{color:var(--accent)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;font-weight:500;color:var(--text2)}
.field input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--surface);color:var(--text);font-family:var(--font);outline:none}
.field input:focus{border-color:var(--accent)}
.margin-opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.mo{padding:10px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;text-align:center;background:transparent;font-family:var(--font);transition:all 0.15s}
.mo.sel-eco{background:#e8f4fd;color:#1a5276;border-color:#3b82c4}
.mo.sel-eq{background:var(--amber-light);color:var(--amber);border-color:var(--amber)}
.mo.sel-far{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
.mo-icon{font-size:18px;display:block;margin-bottom:3px}
.mo-label{font-size:12px;font-weight:600}
.mo-sub{font-size:10.5px;opacity:0.8;margin-top:1px}
.sec-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.ing-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:6px;font-size:13px;gap:8px}
.ing-name{color:var(--text);font-weight:500;flex:1}
.ing-qty{color:var(--text2);min-width:90px;text-align:right;font-size:12px}
.ing-cost{color:var(--accent);font-weight:500;min-width:80px;text-align:right}
.total-box{background:var(--surface2);border-radius:var(--radius-sm);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:10px;flex-wrap:wrap;gap:8px}
.total-label{font-size:13.5px;color:var(--text2)}
.total-val{font-size:20px;font-weight:600;color:var(--accent)}
.empty{text-align:center;padding:24px;color:var(--text3);font-size:13px}
.empty i{font-size:28px;display:block;margin-bottom:8px}
.info-banner{background:var(--amber-light);color:var(--amber);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
</style>
</head>
<body>

<div class="title">Calculadora de buffet</div>
<div class="sub">Baseada nos ingredientes cadastrados no sistema</div>

<div id="default-banner" style="display:none" class="info-banner">
  <i class="ti ti-info-circle" style="font-size:16px;flex-shrink:0"></i>
  Usando ingredientes padrão. <strong style="margin-left:4px">Cadastre seus próprios ingredientes</strong> para personalizar os cálculos.
</div>

<div class="card">
  <div class="sec-label">Tipo de evento</div>
  <div class="event-types" id="event-types"></div>

  <div class="g2">
    <div class="field"><label>Nº de adultos</label><input type="number" id="adultos" placeholder="Ex: 80" min="0" oninput="calcular()"></div>
    <div class="field"><label>Nº de crianças</label><input type="number" id="criancas" placeholder="Ex: 20" min="0" oninput="calcular()"></div>
  </div>

  <div class="sec-label">Margem de consumo</div>
  <div class="margin-opts">
    <button class="mo" id="mo-eco" onclick="setMargem('eco',this)"><span class="mo-icon">🟢</span><div class="mo-label">Econômico</div><div class="mo-sub">Quantidade mínima</div></button>
    <button class="mo sel-eq" id="mo-eq" onclick="setMargem('eq',this)"><span class="mo-icon">🟡</span><div class="mo-label">Equilibrado</div><div class="mo-sub">Meio a meio</div></button>
    <button class="mo" id="mo-far" onclick="setMargem('far',this)"><span class="mo-icon">🔴</span><div class="mo-label">Farto</div><div class="mo-sub">Quantidade máxima</div></button>
  </div>
</div>

<div class="card">
  <div class="sec-label">Resultado</div>
  <div id="result-body"><div class="empty"><i class="ti ti-arrow-up"></i>Selecione o tipo de evento e informe o número de pessoas</div></div>
</div>

<script>
// Ingredientes padrão — usados se não houver cadastro próprio
const DEFAULTS=[
  {id:'d1',nome:'Picanha',unit:'kg',preco:89.90,min:0.35,max:0.45,eventos:['churrasco','casamento']},
  {id:'d2',nome:'Frango grelhado',unit:'kg',preco:22.00,min:0.20,max:0.30,eventos:['churrasco','formatura','corporativo']},
  {id:'d3',nome:'Arroz branco',unit:'kg',preco:8.49,min:0.10,max:0.15,eventos:['churrasco','aniversario','casamento','formatura']},
  {id:'d4',nome:'Salgados fritos',unit:'un',preco:2.50,min:4,max:6,eventos:['aniversario','formatura','corporativo']},
  {id:'d5',nome:'Strogonoff de frango',unit:'kg',preco:28.00,min:0.15,max:0.20,eventos:['aniversario']},
  {id:'d6',nome:'Bolo',unit:'kg',preco:35.00,min:0.08,max:0.12,eventos:['aniversario','casamento','formatura']},
  {id:'d7',nome:'Filé mignon',unit:'kg',preco:95.00,min:0.25,max:0.35,eventos:['casamento']},
  {id:'d8',nome:'Refrigerante lata',unit:'un',preco:4.50,min:1,max:2,eventos:['churrasco','aniversario','formatura','corporativo']},
  {id:'d9',nome:'Farofa',unit:'kg',preco:12.00,min:0.08,max:0.12,eventos:['churrasco']},
  {id:'d10',nome:'Pão de queijo',unit:'un',preco:1.50,min:2,max:3,eventos:['cafe']},
  {id:'d11',nome:'Café com leite',unit:'l',preco:3.00,min:0.20,max:0.30,eventos:['cafe','corporativo']},
  {id:'d12',nome:'Feijão',unit:'kg',preco:7.90,min:0.08,max:0.12,eventos:['aniversario','formatura']},
  {id:'d13',nome:'Linguiça toscana',unit:'kg',preco:28.00,min:0.15,max:0.20,eventos:['churrasco']},
  {id:'d14',nome:'Espumante',unit:'l',preco:32.00,min:0.15,max:0.20,eventos:['casamento','formatura']},
];

const evMeta={
  churrasco:{icon:'🔥',label:'Churrasco'},
  aniversario:{icon:'🎂',label:'Aniversário'},
  casamento:{icon:'💒',label:'Casamento'},
  formatura:{icon:'🎓',label:'Formatura'},
  corporativo:{icon:'🏢',label:'Corporativo'},
  cafe:{icon:'☕',label:'Café da manhã'},
};

// Carrega ingredientes cadastrados pelo usuário ou usa padrão
function loadIngs(){
  const saved=localStorage.getItem('buffetpro_ingredientes');
  if(saved){
    const parsed=JSON.parse(saved);
    if(parsed.length){
      document.getElementById('default-banner').style.display='none';
      return parsed;
    }
  }
  document.getElementById('default-banner').style.display='flex';
  return DEFAULTS;
}

let ings=loadIngs();
let selEvento=null;
let margem='eq';

// Monta os botões de tipo de evento — só mostra eventos que têm ingredientes
function renderEventTypes(){
  const el=document.getElementById('event-types');
  el.innerHTML='';
  const comIngs=Object.keys(evMeta).filter(function(k){
    return ings.some(function(i){return i.eventos.includes(k);});
  });
  comIngs.forEach(function(k){
    const m=evMeta[k];
    const btn=document.createElement('button');
    btn.className='et'+(selEvento===k?' sel':'');
    btn.innerHTML='<span class="et-icon">'+m.icon+'</span><span class="et-label">'+m.label+'</span>';
    btn.onclick=function(){selEvento=k;renderEventTypes();calcular();};
    el.appendChild(btn);
  });
}

function setMargem(m,btn){
  margem=m;
  ['eco','eq','far'].forEach(function(x){
    document.getElementById('mo-'+x).className='mo'+(x===m?' sel-'+x:'');
  });
  calcular();
}

function calcular(){
  if(!selEvento)return;
  const adultos=parseInt(document.getElementById('adultos').value)||0;
  const criancas=parseInt(document.getElementById('criancas').value)||0;
  const pessoas=adultos+(criancas*0.5);
  const body=document.getElementById('result-body');
  if(!pessoas){
    body.innerHTML='<div class="empty"><i class="ti ti-users"></i>Informe o número de pessoas</div>';
    return;
  }
  const ingsEvento=ings.filter(function(i){return i.eventos.includes(selEvento);});
  if(!ingsEvento.length){
    body.innerHTML='<div class="empty"><i class="ti ti-salad"></i>Nenhum ingrediente cadastrado para este evento</div>';
    return;
  }
  const fator=margem==='eco'?0:margem==='eq'?0.5:1;
  let total=0;
  let html='';
  ingsEvento.forEach(function(ing){
    const qty=((ing.min+(ing.max-ing.min)*fator)*pessoas);
    const custo=qty*ing.preco;
    total+=custo;
    html+='<div class="ing-row">'+
      '<span class="ing-name">'+ing.nome+'</span>'+
      '<span class="ing-qty">'+qty.toFixed(2)+' '+ing.unit+'</span>'+
      '<span class="ing-cost">'+fmt(custo)+'</span>'+
    '</div>';
  });
  html+='<div class="total-box">'+
    '<div class="total-label">Custo total estimado<br>'+
      '<small style="font-size:11px;color:var(--text3)">'+adultos+' adultos + '+criancas+' crianças (50%) = '+pessoas+' pessoas</small>'+
    '</div>'+
    '<span class="total-val">'+fmtBRL(total)+'</span>'+
  '</div>';
  body.innerHTML=html;
}

function fmt(v){return Number(v).toFixed(2).replace('.',',');}
function fmtBRL(v){return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}

renderEventTypes();
document.getElementById('mo-eq').className='mo sel-eq';
</script>
</body>
</html>
